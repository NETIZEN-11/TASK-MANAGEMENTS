version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: tm_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - tm_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ping:1}).ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: tm_backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/task_management
      # FIX BUG-L05: Require JWT_SECRET to be explicitly set, no insecure default
      # Pass via: docker compose --env-file .env.production up
      # Or: export JWT_SECRET=your-secret-here && docker compose up
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET environment variable must be set}
      JWT_EXPIRES_IN: 7d
      CLIENT_ORIGIN: http://localhost:8080
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    container_name: tm_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  tm_mongo_data: